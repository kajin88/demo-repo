<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }
        
        .game-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        
        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-gap: 5px;
            width: 300px;
            height: 300px;
            margin: 20px auto;
            background-color: #333;
            border-radius: 10px;
            padding: 5px;
        }
        
        .cell {
            background-color: white;
            border: none;
            font-size: 48px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 93px;
            height: 93px;
        }
        
        .cell:hover {
            background-color: #f0f0f0;
        }
        
        .cell:disabled {
            cursor: not-allowed;
            background-color: #e0e0e0;
        }
        
        .cell.x {
            color: #e74c3c;
        }
        
        .cell.o {
            color: #3498db;
        }
        
        .game-info {
            margin: 20px 0;
            font-size: 20px;
            font-weight: bold;
        }
        
        .current-player {
            color: #2c3e50;
        }
        
        .winner {
            color: #27ae60;
            font-size: 24px;
        }
        
        .draw {
            color: #f39c12;
            font-size: 24px;
        }
        
        .reset-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.2s;
        }
        
        .reset-btn:hover {
            background-color: #2980b9;
        }
        
        .error {
            color: #e74c3c;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎮 Tic-Tac-Toe</h1>
        
        <div class="game-info">
            <div id="status" class="current-player">Current Player: X</div>
        </div>
        
        <div class="game-board" id="gameBoard">
            <!-- Board cells will be generated by JavaScript -->
        </div>
        
        <button class="reset-btn" onclick="resetGame()">New Game</button>
        
        <div id="error" class="error"></div>
    </div>

    <script>
        let gameState = {
            board: [['', '', ''], ['', '', ''], ['', '', '']],
            current_player: 'X',
            winner: null,
            game_over: false
        };

        function createBoard() {
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';
            
            for (let row = 0; row < 3; row++) {
                for (let col = 0; col < 3; col++) {
                    const cell = document.createElement('button');
                    cell.className = 'cell';
                    cell.onclick = () => makeMove(row, col);
                    cell.id = `cell-${row}-${col}`;
                    board.appendChild(cell);
                }
            }
        }

        function updateBoard() {
            for (let row = 0; row < 3; row++) {
                for (let col = 0; col < 3; col++) {
                    const cell = document.getElementById(`cell-${row}-${col}`);
                    const value = gameState.board[row][col];
                    cell.textContent = value;
                    cell.className = 'cell';
                    
                    if (value === 'X') {
                        cell.classList.add('x');
                    } else if (value === 'O') {
                        cell.classList.add('o');
                    }
                    
                    cell.disabled = value !== '' || gameState.game_over;
                }
            }
            updateStatus();
        }

        function updateStatus() {
            const status = document.getElementById('status');
            
            if (gameState.winner) {
                status.textContent = `🎉 Player ${gameState.winner} Wins!`;
                status.className = 'winner';
            } else if (gameState.game_over) {
                status.textContent = "🤝 It's a Draw!";
                status.className = 'draw';
            } else {
                status.textContent = `Current Player: ${gameState.current_player}`;
                status.className = 'current-player';
            }
        }

        function makeMove(row, col) {
            if (gameState.board[row][col] !== '' || gameState.game_over) {
                return;
            }

            fetch('/move', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ row: row, col: col })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    showError(data.error);
                } else {
                    gameState = data;
                    updateBoard();
                    clearError();
                }
            })
            .catch(error => {
                showError('Error making move: ' + error.message);
            });
        }

        function resetGame() {
            fetch('/reset', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    showError(data.error);
                } else {
                    gameState = data;
                    updateBoard();
                    clearError();
                }
            })
            .catch(error => {
                showError('Error resetting game: ' + error.message);
            });
        }

        function loadGameStatus() {
            fetch('/status')
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    showError(data.error);
                } else {
                    gameState = data;
                    updateBoard();
                }
            })
            .catch(error => {
                showError('Error loading game: ' + error.message);
            });
        }

        function showError(message) {
            document.getElementById('error').textContent = message;
        }

        function clearError() {
            document.getElementById('error').textContent = '';
        }

        // Initialize the game
        createBoard();
        loadGameStatus();
    </script>
</body>
</html>
